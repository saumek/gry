</div>

                </span>
</div>
</section>
<!-- Split Screen Players -->
<div class="flex-1 flex flex-col md:flex-row gap-0.5 px-4 pb-4">
<!-- Player 1 Container -->
<div class="flex-1 bg-surface-container-high rounded-xl relative overflow-hidden flex flex-col items-center justify-center p-8 transition-all border-l-4 border-tertiary glow-tertiary">
<div class="absolute top-4 left-4">

</div>

<div class="mt-6 flex flex-col items-center">
<span class="material-symbols-outlined text-tertiary text-4xl" data-icon="check_circle" style="font-variation-settings: 'FILL' 1;">check_circle</span>
<span class="font-label text-tertiary text-[10px] mt-1 font-bold tracking-tighter">PLAYER 1 READY</span>
</div>
</div>
<!-- Vs Badge Overlap -->

<span class="font-headline font-extrabold italic text-2xl md:text-4xl text-primary tracking-tighter">VS</span>
</div>

<button class="flex-[2] py-4 px-6 rounded-full vs-gradient text-on-primary font-label text-sm tracking-widest font-extrabold uppercase shadow-[0_0_30px_rgba(207,150,255,0.4)] hover:scale-[1.02] active:scale-95 transition-all">
