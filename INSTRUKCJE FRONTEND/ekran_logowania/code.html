<body class="bg-background text-on-surface font-body selection:bg-primary/30 min-h-screen flex flex-col overflow-hidden">

<div class="absolute top-[-10%] left-[-10%] w-[50%] h-[50%] bg-primary/10 rounded-full blur-[120px]"></div>

<!-- VS Badge -->
<div class="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 z-30 pointer-events-none">
<span class="text-5xl font-headline font-extrabold italic text-outline-variant opacity-20 select-none">VS</span>
</div>
<!-- Player 1 Card -->
<button class="group relative flex items-center p-5 bg-surface-container-high rounded-xl border border-transparent hover:border-primary/50 transition-all duration-300 active:scale-95 text-left">
<div class="relative w-16 h-16 rounded-full overflow-hidden border-2 border-primary neon-glow-primary mr-5">
<img alt="Player 1 Avatar" class="w-full h-full object-cover" data-alt="Portrait of a male gamer with neon lighting" src="https://lh3.googleusercontent.com/aida-public/AB6AXuBKI2mRYB3BxoUl42xkwYbAjIV_3V9kJgvjAOTzPIGZ0CmokaYO1LK_ep0uWsR-bdJdwTn5TmoEDv_Jm4IDBZ9Xy0rPlQKW5AiiL5F0Ao31xqyibW9G4IGiAvcH9ItixyzLc_PWysC4iJHrRNGAJc77OPMiBFjCRjJJtWqq3qmbS3Ga_qMTXvLY8zP0zHhBpe2tUsxg5qD32DuguFFB8BcDsYk0xc1cafD8vi-skieQBwPCW9lghLD4v6_pkXYcZEE1m5Rdkq3egQ"/>

<span class="w-2 h-2 rounded-full bg-tertiary animate-pulse"></span>
</div>
<h2 class="text-xl font-headline font-bold text-on-surface">V0RTEX_RUNNER</h2>
</div>
<span class="material-symbols-outlined text-primary-dim group-hover:translate-x-1 transition-transform">chevron_right</span>
</button>
<!-- Player 2 Card (Slightly Shifted Design) -->
<button class="group relative flex items-center p-5 bg-surface-container-highest rounded-xl border border-transparent hover:border-secondary/50 transition-all duration-300 active:scale-95 text-left translate-x-2">
<div class="relative w-16 h-16 rounded-full overflow-hidden border-2 border-secondary neon-glow-secondary mr-5">

</div>

</div>
<span class="material-symbols-outlined text-secondary-dim group-hover:translate-x-1 transition-transform">chevron_right</span>
</button>
</div>

<button class="w-full py-4 rounded-full bg-gradient-to-r from-primary to-primary-dim text-on-primary font-label font-bold tracking-widest flex items-center justify-center gap-3 shadow-[0_0_20px_rgba(165,51,255,0.3)] hover:scale-[1.02] active:scale-95 transition-all">
<span class="material-symbols-outlined" data-weight="fill">add_circle</span>
                NEW SESSION
            </button>
<div class="flex items-center gap-3">
